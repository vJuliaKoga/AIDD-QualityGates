changes: null
ssot_note: "リスクレベル別合格閾値の SSOT はこのファイル。LOW/HIGH 基準の変更はこのファイルを更新すること。"
artifact_kind: score_policy
primary_section: "8.5 ガバナンス指針：案件別リスクレベルの設定"

score_policy:
  rationale: |
    「品質」は固定的な絶対値ではなく、案件の特性とリスク許容度に応じて定義される。
    一律の閾値を全案件に適用すると、リスクの低い案件でも過剰な制約が生じ、
    逆にリスクの高い案件で閾値が甘くなるという不整合が起きる。
    可変リスクレベル制を採用することで、案件特性に応じた適切な品質統制を実現する。

  risk_levels:
    rationale: "2段階（LOW / HIGH）を基本とし、案件開始時に明示的にリスクレベルを宣言する。"
    levels:
      - level: LOW
        pass_threshold: "70点以上"
        operational_policy: "軽微な構造違反や数件の曖昧語は減点対応とし、スピードを優先"
        applicable_cases:
          - "PoC・プロトタイプ開発"
          - "社内ツール・影響範囲の限定された改修"
          - "CI 未組込みチームの初回導入"
        rationale: "スピードと品質のトレードオフが許容される案件では、過剰な品質ゲートが導入障壁になる。70点は最低限の構造整合性を担保しつつ、実用的な速度感を維持できるライン。"
        examples:
          - "G1 曖昧語が 7 件 → 減点（-3点）だが通過"
          - "G3 軽微な構造警告が 2 件 → 減点（-5点）だが通過"
      - level: HIGH
        pass_threshold: "90点以上"
        operational_policy: "厳格な統制を適用。微細な逸脱も修正対象とし、設計の純粋性を担保"
        applicable_cases:
          - "本番リリース前の品質確認"
          - "外部公開・顧客提供ソフトウェア"
          - "金融・医療等のリスク感度が高いドメイン"
          - "CI 組込みチームのゲートキープ"
        rationale: "設計崩壊が直接的なビジネスリスク・信頼損失につながる案件では、微細な逸脱も許容しない厳格な統制が必要。90点は構造純粋性を担保しつつ、現実的な到達可能スコア。"
        examples:
          - "G3 軽微な構造警告が 2 件 → 修正必須（通過不可）"
          - "G4 Faithfulness スコア 0.88 → 0.90 到達まで再実行要"

  risk_level_declaration:
    rationale: "案件開始時に明示的にリスクレベルを宣言することで、判断基準を事前に確定する。"
    where_to_declare: "案件の config ファイルまたは Gate Runner 実行オプションで指定"
    default: "宣言なしの場合は HIGH を適用（安全側フォールバック）"
    format_example: "risk_level: LOW  # または HIGH"

  interaction_with_fatal_conditions:
    statement: "リスクレベルに関わらず、Instant Fail 条件（PLN-PLN-DES-005 参照）は常に適用される"
    rationale: "LOW Risk であっても G5 トレーサビリティ欠落・G3 構造重大違反・G4 Faithfulness 0.6未満・G1 曖昧語 10件超・CI失敗は即時失格。リスクレベルは第二段階のスコア閾値のみに影響する。"

  relationship_to_score_policy:
    note: "合否の最終判断は人（Coach の Done/Abort）が負う（PLN-PLN-EVAL-001 参照）"
    score_role: "スコアは劣化検知・再確認トリガーとして機能する補助指標"

  future_extension:
    note: "MEDIUM Risk（80点）等の中間レベルは、運用データの蓄積後に追加検討する"

