architecture:
  rationale: |
    「動けば OK」から「説明できる品質」への転換を実現するには、
    判断・検証・証跡の3機能を明確に分離し、それぞれを専用コンポーネントに割り当てる必要がある。
    分離により、CI が使えない層でも Coach UI から段階導入でき、
    CI 対応チームはそのまま Gate Runner をパイプラインに組み込める。

  overview:
    name: "QA4AIDD Gate + Coach"
    tagline: "AIDDにおける上流工程品質保証の「構造化・可視化・検証可能化」基盤"
    layers: 2
    layer_description: "Coach UI（人の判断） + Gate Runner（自動検証） + Allure（可視化）"

  role_assignment:
    rationale: "各役割を担当・実現手段で明示し、責任境界を設計時点で固定する。"
    roles:
      - role: "判断（最終責任）"
        owner: "人"
        mechanism: "Coach UI（Done/Abort + 理由 + 証跡）"
        note: "最終判断は人が負う。スコアは参考情報に留める。"
      - role: "検証（機械的チェック）"
        owner: "自動"
        mechanism: "Gate Runner（Docker/CLI でゲート実行）"
        note: "G1〜G5 + PF を自動実行し、定量スコアと JSON レポートを出力する。"
      - role: "記憶・証跡（説明可能性）"
        owner: "システム"
        mechanism: "JSON 出力 → Allure 集約"
        note: "自動ゲート結果 + 人の判断ログを Allure に統合し、後追い説明可能性を担保する。"

  components:
    coach_ui:
      description: "押せば展開される QA ワークフロー UI（視座共有 + 人の最終判断）"
      rationale: "初学者が「何を見ればいいか」を迷わないよう、観点をチュートリアル化する。最終判断を人が負うことを Done/Abort 操作で強制する。"
      inputs:
        - "工程パック定義ファイル（JSON/YAML）"
        - "ユーザー操作（Done/Abort/Pending + 理由 + 確認者名）"
      outputs:
        - "checklistresults.json（チェック者・時刻・理由・エビデンス参照）"
      key_behaviors:
        - "工程タブ：[企画][要件][基本設計][詳細設計][実装][テスト]（段階導入では表示制御）"
        - "タスク展開：Todo → Done/Abort（理由必須）→ 次項目 Unlock"
        - "JSON エクスポート：任意状態で出力可能（CI 連携テスト用）"
        - "ステータス変更時に確認者名入力必須（バリデーション）"
      referenced_detail: PLN-PLN-UI-001

    gate_runner:
      description: "品質ゲートを自動実行するエンジン（Docker/CLI）"
      rationale: "Docker による配布でCI・ローカル環境問わず同一結果を保証する。手動実行・CI 組み込みの両方に対応する疎結合設計。"
      inputs:
        - "checklistresults.json（Coach 出力）"
        - "企画/要件/設計の YAML 成果物"
        - "prompts/, requirements/ 等の評価対象ファイル"
      outputs:
        - "output/*.json（各ゲートのレポート JSON + サマリ・exitcode 含む）"
        - "allure-results/（Allure 統合用）"
      gates:
        - "G1: 曖昧語チェック + 内容 lint"
        - "G2: Checklist 完了検証（Coach 判断ログ検証）"
        - "G3: Schema 検証 + 構造 lint"
        - "G4: Deep Eval スコアリング"
        - "G5: トレーサビリティ（全 ID 参照）"
        - "PF: Promptfoo 評価"
      referenced_detail: PLN-PLN-DES-002

    allure:
      description: "品質の可視化ハブ（Allure Report）"
      rationale: "自動ゲート結果と人の判断ログを一元化することで、品質状態の全体像を単一レポートで把握できる。Abort 分析とスコア推移により継続的改善を支援する。"
      inputs:
        - "allure-results/（Gate Runner 出力）"
        - "スコア推移データ（Deep Eval / Promptfoo）"
        - "Abort ログ（Coach UI 出力）"
      outputs:
        - "Allure Report（HTML）"
      displays:
        - "自動ゲート結果（G1〜G5, PF）"
        - "スコア推移（Deep Eval / Promptfoo）"
        - "Abort 分析（カテゴリ分布、理由品質）"
        - "Traceability Matrix（要件→設計→テストの紐付け）"

  design_philosophy:
    rationale: "3つの設計哲学はすべての実装判断の根拠となる。逸脱する場合は明示的な判断記録が必要。"
    items:
      - "「考えなくていい QA」ではなく「考える順番を固定する QA」"
      - "AI に判断を委譲しない（判断は人、検証は自動、証跡はシステム）"
      - "形骸化を防ぐため、品質ゲートを満たさないものは次工程（/デプロイ）に進めない"

  deployment:
    gate_runner: "Docker/CLI（配布しやすい・保守コスト最小）"
    coach_ui: "ローカルまたは簡易ホスティング（Phase 1 はサーバー不要）"
    ci_integration: "Gate Runner は CI/CD パイプラインにそのまま組み込み可能"

  extensibility:
    - "ConTrack Adapter（将来）：ID 参照の外部システム連携"
    - "BAS/DET パック（Phase 3）：設計工程への拡張"
    - "SaaS 展開（Phase 3）：Coach UI のクラウド型提供"

