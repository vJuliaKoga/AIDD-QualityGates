artifact_kind: workflow
primary_section: "6.1 CheckFlow / 6.2 Gate Runner / 14. Allure による可視化"

workflow:
  rationale: |
    Coach（人の判断）→ Gate Runner（自動検証）→ Allure（可視化）の3段階フローにより、
    人の判断と自動チェックの両方を1つの品質レポートに統合する。
    ファイルベースの疎結合設計（JSON 経由）により、Coach と Runner を独立してデプロイ・実行できる。

  overview:
    flow: "CheckFlow → checklistresults.json → Gate Runner → output/ + allure-results/ → Allure Report"
    trigger: "人が CheckFlow で Done/Abort を確定した後、手動または CI で Gate Runner を実行する"
    output_hub: "Allure Report（自動ゲート結果 + 人の判断ログ + スコア推移を一元表示）"

  steps:
    - step: 1
      name: "CheckFlow：QA ワークフロー実行"
      actor: "人（QA/開発者）"
      input:
        - "工程パック定義ファイル（チェックリスト/観点/テンプレ）"
      action:
        - "工程タブを選択（[企画][要件][基本設計][詳細設計][実装][テスト]）"
        - "各チェックリストを展開し、観点/テンプレ/例/参照を確認"
        - "確認者名を入力（必須バリデーション）"
        - "ステータスを Done または Abort（理由必須）に設定"
        - "次項目が Unlock され、繰り返す"
      output:
        - file: "checklistresults.json"
          schema:
            - "checkedby（確認者名）"
            - "timestamp（ISO 8601）"
            - "status（Done | Abort）"
            - "reason（Abort 時必須）"
            - "evidence_refs（証跡リンクリスト）"
          export_condition: "任意状態で出力可能（InProgress でも出力可・CI 動作確認用）"
      warning: "InProgress 状態の項目が残る JSON を CI に投入した場合、G2 で Fail 判定になる"

    - step: 2
      name: "Gate Runner：品質ゲート自動実行"
      actor: "自動（Docker / CLI / CI）"
      input:
        - "checklistresults.json（Coach 出力）"
        - "*.yaml（企画/要件/設計の YAML 成果物）"
        - "*.md（企画/要件の Markdown 文書）"
        - "prompts/（プロンプトファイル）"
        - "requirements/（要件ファイル）"
      action:
        - "G1: 曖昧語チェック + 内容 lint → ambiguityreport.json"
        - "G2: Checklist 完了検証（checklistresults.json 読込）→ checklistvalidation.json"
        - "G3: Schema 検証 + 構造 lint → schemareport.json"
        - "G4: Deep Eval スコアリング → deepevalscores.json"
        - "G5: トレーサビリティ（全 ID 参照マトリクス）→ tracematrix.json"
        - "PF: Promptfoo 評価 → promptfooresults.json"
      output:
        - "output/*.json（各ゲートのレポート JSON + サマリ・exitcode 含む）"
        - "allure-results/（Allure 統合用 XML/JSON）"
      gate_output_schema:
        fields:
          - "gate_id（ゲート識別子）"
          - "axis_scores（評価軸ごとの点数）"
          - "score_total（合計スコア）"
          - "status（pass | warn | fail）"
          - "evidence（根拠参照リスト）"

    - step: 3
      name: "Allure：品質可視化"
      actor: "システム（Allure Report 生成）"
      input:
        - "allure-results/（Gate Runner 出力）"
        - "checklistresults.json（Coach 出力）"
      action:
        - "allure generate allure-results -o allure-report"
      output:
        - "Allure Report HTML（ブラウザ閲覧可能）"
      displays:
        - "自動ゲート結果（G1〜G5, PF）一覧"
        - "スコア推移（Deep Eval / Promptfoo の時系列グラフ）"
        - "Abort 分析（カテゴリ分布・理由品質・Abort 率）"
        - "Traceability Matrix（要件→設計→テストの紐付け）"
        - "Warning 表示：スコア 0.70 未満の場合に理由要約/改善ガイド/再実行条件を表示"

  g2_validation_detail:
    rationale: "G2 は人の判断ログを CI に接続する唯一のゲート。Fail 条件を明確にすることで形骸化を防ぐ。"
    fail_conditions:
      - "項目に「Todo」が残っている"
      - "Abort した際、理由（正当な根拠）がログに記載されていない"
    warning_conditions:
      - "Abort 率が規定値を超え、「判断の回避」が常態化している"
    internal_weights:
      - "G2 内でもドメイン/フェーズに応じて項目ごとに内部重みを設定し、重要な判断の漏れをスコアに直結させる"
    implementation_estimate: "最短 1 週間で JSON 読込→ Pass/Fail 判定の実装が成立する想定"

  allure_integration_note:
    description: "全ゲート結果は CI/CD パイプライン上で単一の「統合報告書（JSON）」として集約される"
    benefit: "判定箇所を一元化し、パイプラインの実行パフォーマンスを最大化する"

