architecture:
  context:
  - 上流工程（企画〜要件〜設計）の曖昧さが原因で、仕様と実装の乖離、手戻り、テスト工数増が顕在化しやすい
  core_approach:
  - 品質保証（QA4AIDD）を『自動ゲート』＋『人の判断』の2層で担保する
  - 『動けばOK』から『説明できる品質』へ転換するための社内基盤を構築する
  responsibility_split:
  - responsibility: 判断（最終責任）
    owner: 人
    mechanism: CheckFlow（Done/Abort + 理由 + 証跡）
  - responsibility: 検証（機械的チェック）
    owner: 自動
    mechanism: Gate Runner（Docker/CLIでゲート実行）
  - responsibility: 記憶・証跡（説明可能性）
    owner: システム
    mechanism: JSON出力 → Allure集約
  adoption_note:
  - CIが使えない層にも『視座共有（教育）』を提供しつつ、CIに載せたいチームは品質ゲートを組み込める
