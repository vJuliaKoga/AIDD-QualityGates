score_policy:
  rationale: |
    スコアを合否の唯一根拠にすると、形式的なスコア達成を目的とした形骸化が起きやすい。
    一方でスコアを完全無視すると品質劣化の早期検知ができない。
    「スコアは参考・劣化検知に使い、最終判断は人」という役割分担が最適。

  core_policy:
    statement: "スコアは合否の唯一根拠にしない（最終判断は人＝ Coach の Done/Abort）"

  warning_policy:
    threshold: "0.70（= 0.70 未満の場合に Warning を必ず出す）"
    basis: "要件妥当性チェックリスト雛形の pass_threshold: 0.7 を社内標準の警告ラインとして採用"
    rationale: "品質劣化を早期検知するため、0.70 未満は自動的に Warning を発生させる。初学者が萎えないよう、理由要約・改善ガイド・再実行条件をセットで提供する。"
    warning_output:
      display: "Allure 上で Warning として表示"
      contents:
        - "理由要約"
        - "改善ガイド"
        - "再実行条件"

  deep_eval_policy:
    usage:
      - "品質の定量指標として使用"
      - "モデル変動を前提にスコア推移を Allure に記録し、劣化を検知する"
      - "Allure にスコア推移も集約"
    not_for: "単一時点のスコアだけで合否を決定する目的には使わない"

  promptfoo_policy:
    usage:
      - "プロンプト品質の回帰テストとして位置づけ"
      - "テンプレ改善サイクルの根拠にする"

  fail_block_policy:
    statement: "Fail（ビルド停止）にする条件は重大ゲートに限定し、段階的に導入する"
    fail_conditions:
      - "G5 トレーサビリティ欠落（孤立 ID）"
      - "G3 スキーマ定義の逸脱（構造重大違反）"
      - "G4 Faithfulness スコアが 0.6 未満"
      - "G1 曖昧語が 10 件超"
      - "G2 Todo 残存・Abort 理由未記載"
    warn_conditions:
      - "スコアが 0.70 未満"
      - "G2 Abort 率が規定値超"

