goal:
  primary:
    statement: "仕様書（企画〜要件・設計）の妥当性を検証可能にし、仕様と実装の乖離を防止する。"
    rationale: |
      AI活用開発（AIDD）では上流工程の曖昧さが原因で仕様と実装の乖離・手戻り・テスト工数増が
      顕在化しやすい。根本対処として「検証可能な仕様書」を起点に置くことで、後工程の品質劣化を
      防止する構造を作る。
    measurability:
      - "成功条件は KPI（sec.18）として Phase 別に定義"
      - "CheckFlow 利用者数・チェックリスト完了率・理由記入率 100%"
      - "CI 組込みチーム数・手戻り削減率（Phase 別に数値設定）"

  secondary:
    - statement: "上流工程 QA 観点を標準化・構造化する"
    - statement: "判断根拠とプロセスを記録・可視化する"
    - statement: "QA4AIDD の実践手法を確立し、社内に段階導入する"
      detail: "再現可能なテンプレ / プロンプト / チェックリストを資産化し、Phase 1（REQ パック先行）→ Phase 2（PLN パック追加）→ Phase 3（BAS/DET 拡張）の順で展開する。"

  design_philosophy:
    - "「考えなくていい QA」ではなく「考える順番を固定する QA」"
    - "AI に判断を委譲しない（判断は人、検証は自動、証跡はシステム）"
    - "品質ゲートを満たさないものは次工程（/デプロイ）に進めない"

  qa4aidd_definition:
    core_principles:
      - "① AI に正しく指示を与える"
      - "② 指示が守られていることを確認する"
    implementation:
      correct_instruction:
        - "構造化テンプレ"
        - "曖昧語排除チェック（G1）"
      compliance_confirmation:
        - "JSON Schema 検証（G3）"
        - "Deep Eval 評価（G4）"
        - "構造一貫性テスト"
      quality_visibility:
        - "Allure Report でゲート結果をモニタ（G1〜G5, PF）"

  risks:
    - risk: "形骸化・適当 Done"
      mitigation: "ゲートでブロック、理由品質の最低基準を設ける"
    - risk: "AI モデル変動によるスコア不安定"
      mitigation: "モデル固定 + スコア推移監視 + Warning 運用（0.70 未満は必ず Warning）"
    - risk: "導入ハードル（CI/Docker 未対応層）"
      mitigation: "Coach 先行で教育 → Runner 任意 → CI へ段階移行"

  success_kpis:
    phase_1:
      - "CheckFlow 利用者数"
      - "チェックリスト完了率"
      - "理由記入率 100%"
    phase_2:
      - "CI 組込みチーム数"
    phase_3:
      - "手戻り削減率"

