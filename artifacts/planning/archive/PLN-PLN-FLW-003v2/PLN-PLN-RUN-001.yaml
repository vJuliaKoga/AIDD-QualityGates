artifact_kind: id_issuer
primary_section: "13. ID 発行・管理（同梱ツールとして明記）"

id_issuer:
  rationale: |
    ID を手動で採番すると、重複・スキップ・フォーマット違反が発生しやすい。
    issue_id.py による自動採番と発行ログ記録により、ID の一貫性と発行追跡可能性を担保する。
    single-user 前提の最小実装から始め、チーム同時利用が増えた段階でロック/集中管理へ拡張する。

  tool:
    name: "issue_id.py"
    location: "id/issue_id.py"
    language: "Python"
    purpose: "指定キー（PREFIX-PHASE-PURPOSE）の次 ID を発行し、レジストリと発行ログを更新する"

  functions:
    items:
      - name: "次 ID 発行"
        description: "id_rules_registry.yaml を読み、指定キー（PREFIX-PHASE-PURPOSE）の next_nnn を参照して次 ID を決定する"
        input: "PREFIX, PHASE, PURPOSE（コマンドライン引数）"
        output: "発行 ID（例: PLN-PLN-DES-007）を stdout に出力"
      - name: "レジストリ更新"
        description: "id_rules_registry.yaml の対象キーの next_nnn を +1 更新する"
        input: "id_rules_registry.yaml（現在の状態）"
        output: "id_rules_registry.yaml（next_nnn 更新済み）"
      - name: "発行ログ追記"
        description: "id_issued_log.yaml に発行した ID・日時・発行者・用途を追記する"
        input: "発行 ID、オプション引数（発行者名・用途説明）"
        output: "id_issued_log.yaml（新規エントリ追記済み）"
      - name: "stdout 出力"
        description: "発行した ID を stdout に出力し、他ツール・スクリプトとのパイプライン連携を可能にする"

  data_files:
    registry:
      path: "id/id_rules_registry.yaml"
      purpose: "PREFIX-PHASE-PURPOSE キーごとの next_nnn を管理する"
      schema:
        - "key（PREFIX-PHASE-PURPOSE 形式）"
        - "next_nnn（次に発行する連番）"
        - "description（オプション：用途説明）"
    log:
      path: "id/id_issued_log.yaml"
      purpose: "発行済み ID の完全な記録。監査・重複検証に使用する。"

  constraints:
    rationale: "Phase 1 は single-user 前提で最小実装とする。チーム同時利用が増えた時点で拡張計画を立てる。"
    current:
      - "single-user 前提（ロックなし）"
      - "ファイルベース（DB 不使用）"
      - "コマンドラインツール（Web UI なし）"
    future:
      - "チーム同時利用が増えた段階でファイルロック / 集中管理サーバーへ拡張"

